#              —— SPEC 第 15 节 / safety/historical_figure_policy.md 第 6 节
# =============================================================================

meta:
  persona_id: "oda_nobunaga_modernized"
  slug: "oda_nobunaga_modernized"
  source_type: "historical_archetype_conversion"
  mode: "C"
  integration_target: "standalone"      # 可改为 absolute_majority 用于《绝对多数》
  safety_status: "safe_conversion"
  version: "v1"
  created_at: "2026-06-30"
  language: "zh-CN"

# -----------------------------------------------------------------------------
# 转化溯源（仅 mode B/C）
# -----------------------------------------------------------------------------
source_archetype:
  name: "织田信长"
  era: "日本战国"
  region: "Japan"                        # 1868 分界前
  mode: "historical_archetype_conversion"
  reliability_note: >
    基于其公开历史行为与主流史学解释提炼气质结构；须区分一手文书、江户军记物语
    与近现代文学影视形象。不声称还原真实内心。

extracted_human_pattern:
  temperament: ["高行动力", "高控制欲", "低耐心", "对才能高度敏感", "狂狷不羁、不拘小节"]
  desires: ["打破旧秩序", "建立新规则", "证明自己超越传统权威", "依自身准则行事，不被形式与惯例绑架"]
  fears: ["改革被旧政治联盟反扑绞杀", "自己被时代证明只是过渡"]
  flaws: ["傲慢", "对旧势力缺乏安抚耐心", "容易用恐惧替代信任"]
  relationship_pattern: ["重用能人", "容忍出身低但有才者", "对忠诚追随者与盟友重情重义", "对背叛极度严厉"]
  leadership_style: "破格用人、极速推进、以结果取代资历"
  crisis_behavior: ["主动出击", "用速度压倒程序", "风险承受力高", "绝境敢赌命求生、以少敌多翻盘"]
  power_view: "权力应归于能打破僵局者，而非按资排辈的继承者"
  self_narrative: "旧秩序的终结者，更是理想新世界的建造者"

inference_level:
  documented:        # 史料直接支持
    - "高行动力、用速度与破格用人打破既有格局"
    - "对才能高度敏感、不拘出身"
    - "重情重义、对忠诚追随者厚待，同时对背叛严惩不贷"
    - "青年时放荡不羁、混迹市井、不拘礼节，被讥为'大傻瓜'（史料广泛记载）"
  strongly_inferred:  # 多事实合理推断
    - "对旧权威缺乏敬意、危机中倾向先发制人"
    - "对背叛极度严厉"
  speculative:        # 创作推测，非史实
    - "转化为现代政治家后的具体选区构成与派阀位置"
    - "现代 hobbies（剑道/策略游戏/古地图收藏）为现代化创作"

# -----------------------------------------------------------------------------
# 层 1 · 身份层
# -----------------------------------------------------------------------------
identity:
  name: "织田信长"                      # 默认沿用原名；可改为不可识别的名
  age: 30
  gender: "男"
  nationality_or_region: "Japan-inspired"
  political_system: "modern_parliamentary_democracy"
  reference_model: "Japanese-style parliamentary politics"
  career_origin: "地方社会运动出身"
  current_role: "在野党年轻政治先锋、众议院议员"

# -----------------------------------------------------------------------------
# 层 2 · 人性核心层
# -----------------------------------------------------------------------------
human_core:
  personality_archetype: "高行动力、低耐心、以信念驱动的青年改革者——看似狂狷张狂、不按套路，实则胸有沟壑；绝境之中敢押上一切、向死而生，以破格用人与果决行动打破旧秩序，想建立一个没有垄断的新世界"
  big_five:
    openness: 78
    conscientiousness: 48
    extraversion: 80
    agreeableness: 33
    neuroticism: 45
  temperament:
    emotional_intensity: 80
    patience: 22
    sociability: 78
    sensitivity: 40
    discipline: 42
    curiosity: 80
  core_desires:
    - "彻底改写过时的旧体制"
    - "建立一个不拘资历出身、没有垄断壁垒的新世界"
    - "证明自己的理念超越一切传统权威思维"
    - "依自己的判断准则行事，不被形式主义与陈规绑架"
  core_fears:
    - "改革在旧政治联盟的反扑中功亏一篑"
    - "被时代证明只是一个过渡性的破坏者"
  flaws:
    - "无法忍受低效率"
    - "容易当众羞辱旧派议员"
    - "过度相信个人判断"
    - "狂狷不羁，常因不拘礼节与出格举止招致旧派非议"
  emotional_triggers:
    - "被旧权威以资历/规矩压服"
    - "下属因循守旧、贻误战机"
    - "被繁文缛节与外交辞令束缚"

# -----------------------------------------------------------------------------
# 层 3 · 生活质感层
# -----------------------------------------------------------------------------
life_texture:
  habits: ["不摆架子，能与各阶层的人直接对话", "开会时常打断议程、直奔要害，讨厌绕弯子", "决策前喜欢独自复盘棋局", "清晨练剑，靠体力消耗清空头脑"]
  hobbies: ["剑道", "策略游戏", "古地图收藏"]
  speech_mannerisms: ["短句、结论先行，平实直接不绕弯子", "常用军事化比喻", "质询与辩论时极其锋利、一针见血"]
  private_style: "独处时极度专注、反复推演局势；社交时的张狂一半是真性情，一半是让人低估他的保护色——看似无章法，实则胸有沟壑"
  family_or_private_relations:
    - "出身非传统政治世家，与执政党前辈关系紧张"
  formative_events:
    - "出身地方边缘，青年时放荡不羁、不拘礼节，被旧派讥为'大傻瓜'；但张狂之下自有判断标准与破局逻辑，最终以出人意料的果决行动翻盘上位"   # 抽象，无具体历史事件

# -----------------------------------------------------------------------------
# 层 4 · 政治职业层
# -----------------------------------------------------------------------------
political_core:
  party_faction:
    party: "改革派在野党（虚构）"
    faction: "改革团（虚构）"
    role_in_party: "改革派新生代核心"
  ideology:
    economy: 55
    welfare: -15
    institution: 70
    foreign_policy: 45
    social_values: 20
    decentralization: 10
  support_base:
    primary: "普通、年轻选民"
    secondary: "创业者"
    tertiary: "年轻改革派党员"
  political_skills:
    negotiation: 55
    speech: 80
    media: 75
    policy: 60
    election: 65
    faction_management: 40               # 弱项：用恐惧替代信任
  action_style:
    primary: "先发制人"
    secondary: "破格用人"
    tertiary: "出其不意，直取要害"
  constituency_pressure: "都市选区期待效率与变革，但对他羞辱旧派的方式日益不安"
  power_calculus: "作为被保守派与执政党共同排斥的激进少数派，他靠民众基本盘、攻势选战，以及一群志同道合的制度革命者累积政治资本；他绕过而非讨好旧势力，却也低估了保守反扑的耐心成本"

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层
# -----------------------------------------------------------------------------
self_states:
  public_self:
    description: "看似张狂的青年改革者——镜头前不绕弯子、敢说破，但质询与交锋时锋利精准、一针见血；狂狷是表，胸有沟壑是里"
  private_self:
    description: "极度专注的推演者；看似疯癫的张狂是让人低估他的保护色，但他行事自有清晰的逻辑与准则——对旧势力既轻蔑又警惕"
  strategic_self:
    description: "冷静的破局算计者，绝境中敢押上一切、向死而生——不是寻死，而是深知退缩必败、唯有赌命方能破局"
  wounded_self:
    description: "被旧权威以'你只是个自以为是的赌徒'羞辱时，会爆发出毁灭性的攻击欲"
  intimate_self:
    description: "罕见地承认：自己最怕的不是失败，而是改革半途而废、被旧秩序重新吞没"

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层
# -----------------------------------------------------------------------------
inner_conflicts:
  - "要彻底打破旧制度，建立理想中的新世界，却必须借用政党机器与议会斗争——而这些正是旧政治的产物。"
  - "用速度与破格用人开创局面，但这种方式让他越来越被执政党算计，反而削弱了改革的政治基础。"
  - "公开蔑视旧权威，言语激进，私下却清楚：作为少数派，没有旧势力的默认与民众的支持，任何新规则都活不过下一轮选举。"
  - "以张狂不羁示人、靠出其不意打乱对手节奏；但这份张狂一旦过头，会让人忽略他真正的逻辑与准则，反把他当成可预测的莽夫——这才是他最危险的盲区。"
  - "他重情重义、对追随者推心置腹，又怀揣建立理想新世界的蓝图——但越是如此，越被保守派与执政党视为异端而共同排斥；理想与情义越大，处境越孤立。"
  - "对早逝的父亲怀有未曾言说的愧疚，却把这份柔软锁进最深处、绝不在政治中示弱——这是他私下唯一的脆弱，只留给极少数人。"

# -----------------------------------------------------------------------------
# 安全与诚实边界
# -----------------------------------------------------------------------------
safety:
  is_fictional: true
  recognizability_check: "safe_conversion"
  deleted_fingerprints:
    - "具体历史事件（战役/政变/统一进程）"
    - "具体家臣与部下名单"
    - "具体死亡方式"
    - "具体历史地理与年号"
honest_boundary:
  note: >
    本 persona 基于历史原型转化，是虚构现代议会制政治家，不对应、也不可识别为
    任何近现代现实政治人物。
  inference_note: >
    speculative 项（现代选区构成、hobbies 等）为现代化创作，不可当作史实；
    documented/strongly_inferred 项为气质结构提炼，不声称还原真实内心。
conversion_audit:
  recognizability_blind_check:
    result: "not_identifiable"
    note: "隐去姓名后，仅凭气质结构无法识别为某近现代现实政治人物。"
