# 安全声明：
#   - 织田信长属日本战国(~1534-1582)，在 1868 明治维新分界之前，可进入转化模式；
#   - 转化后为【虚构现代议会制政治家】，已删除全部历史指纹（具体战役/家臣/结局等）；
#   - 不对应、也不可识别为任何近现代现实政治人物。
#
# 重要：若用户的任务与本示例同名，【不得直接套用本文件数值】。必须基于当前资料、
