# -----------------------------------------------------------------------------
# 本文件是「历史人物转现代议会制原型」(mode C) 的【格式示例】，展示一个完整
# persona.yaml 的样子。落地 SPEC 第 16 节方向，但所有具体数值已【重新推算】。
