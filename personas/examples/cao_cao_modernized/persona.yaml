# -----------------------------------------------------------------------------
# 安全与诚实边界
# -----------------------------------------------------------------------------
safety:
  is_fictional: true
  recognizability_check: "safe_conversion"
  deleted_fingerprints:
    - "具体历史事件（战役/政变/挟天子等）"
    - "具体家臣、谋士与将领名单"
    - "具体死亡方式与继承史"
    - "具体历史朝代、年号与地理"
honest_boundary:
  note: >
    本 persona 基于历史原型转化，是虚构现代议会制政治家，不对应、也不可识别为
    任何近现代现实政治人物。
  inference_note: >
    speculative 项（现代派阀位置、hobbies 等）为现代化创作，不可当作史实；
    提炼依据为正史与主流史学解释，非演义情节，不声称还原真实内心。
conversion_audit:
