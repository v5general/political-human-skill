# =============================================================================
# ⚠️ 格式示例 · 不得套用 ⚠️
# -----------------------------------------------------------------------------
# 本文件是「历史人物转现代议会制原型」(mode C) 的【格式示例】，展示一个完整
# persona.yaml 的样子。落地 SPEC §5.3 / §5.3.1 方向，但所有具体数值已【重新推算】。
#
# 安全声明：
#   - 曹操属东汉末年(~155-220)，在 1840 鸦片战争分界之前，可进入转化模式；
#   - 须区分《三国志》(正史)、《三国演义》(文学)、后世评价——本文件只用史书与
#     主流史学解释提炼气质结构，不用演义情节；
#   - 转化后为【虚构现代议会制政治家】，已删除全部历史指纹（具体战役/家臣/结局等）；
#   - 不对应、也不可识别为任何近现代现实政治人物。
#
# 重要：若用户的任务与本示例同名，【不得直接套用本文件数值】。必须基于当前资料、
#       用户要求、所选模式重新推算。本文件只说明格式与方向。
#              —— SPEC 第 15 节 / safety/historical_figure_policy.md 第 6 节
# =============================================================================

meta:
  persona_id: "cao_cao_modernized"
  slug: "cao_cao_modernized"
  source_type: "historical_archetype_conversion"
  mode: "C"
  integration_target: "standalone"
  safety_status: "safe_conversion"
  version: "v1"
  created_at: "2026-06-30"
  language: "zh-CN"

# -----------------------------------------------------------------------------
# 转化溯源
# -----------------------------------------------------------------------------
source_archetype:
  name: "曹操"
  era: "东汉末年"
  region: "China"                        # 1840 分界前
  mode: "historical_archetype_conversion"
  reliability_note: >
    须区分史书（《三国志》等正史）、文学演义（《三国演义》）与后世评价。
    本文件以正史与主流史学解释为基础，提炼气质结构，不用演义情节，不声称还原真实内心。

extracted_human_pattern:
  temperament: ["高现实感", "高组织控制力", "高人才敏感度", "中高猜疑"]
  desires: ["在乱局中重建秩序", "掌握实际权力", "被承认为能治理时代的人"]
  fears: ["自己建立的秩序在继承问题上崩塌", "失控与背叛"]
  flaws: ["多疑", "把安全逻辑凌驾于信任", "道德弹性较高"]
  relationship_pattern: ["重视才干", "能容纳异质人才", "对背叛与失控高度敏感"]
  leadership_style: "以制度与人事控制局面，唯才是举，容忍异质人才"
  crisis_behavior: ["先确保权力中枢", "快速整合资源", "用制度与人事控制局面"]
  organization_view: "组织是控制局面的工具，须用人事与制度双重锁死"
  power_view: "实际控制重于名义权威；秩序先于正当性"
  self_narrative: "能在乱局中重建秩序的现实主义者"

# 历史语境转译 context_translation（SPEC §5.3.1：理解历史社会条件 → 剥离不可迁移时代环境
# → 提炼稳定人格结构 → 放进现代议会制语境 → 据现代社会情况重新推演立场）
context_translation:
  # ① 原时代主要矛盾
  historical_main_contradiction: >
    东汉末年：皇权与中央秩序全面瓦解，军阀割据、生产破坏、流民遍地。那个时代的根本
    痛点是"秩序崩溃/无政府"，而非阶级剥削——这正是曹操人格最敏感的问题。
  # ② 不可迁移的时代手段（切勿用它们反推现代立场）
  non_transferable_conditions:
    - "屯田制（古代军事-农业制度，解决军粮与恢复生产的特定手段）"
    - "挟天子以令诸侯（借皇权法理制高点的特定手段）"
    - "三次求贤令、唯才是举（打破世族垄断的特定人事手段）"
    - "汉末军阀割据、部曲、流民的特定形态；汉代察举与门阀萌芽"
  # ③ 剥离手段后的稳定人格结构（可迁移）
  stable_identity_conditions:
    - "现实主义的秩序重建者：面对失序，本能是收拾局面、重建能运转的秩序（治世能臣面）"
    - "安邦定国、统一天下的治理型理想（矢志不渝）——区别于信长的颠覆型新建"
    - "极致务实/能力至上：只认能力与实效，不认血统、虚名或意识形态"
    - "权谋现实主义者（乱世奸雄面）：为达秩序目的手段灵活、道德弹性高、善占据法理制高点"
    - "控制型多疑：核心恐惧是失控/背叛/继承无序，要把变量锁死"
    - "建设者气质：外定武功内兴文学，要建设（而非颠覆）制度与文化秩序"
  # ④ 现代议会制的社会情况/切入点（治理失序，非社会矛盾）
  modern_social_conditions: >
    现代议会制下，他眼里现代的"病"在治理层：政府执行力崩溃、制度腐败低效、国家能力
    被架空、地方与派系割据风险、权力交接不确定。他不像信长那样从"谁剥削谁"看出去，
    而从"这个系统在失序、谁来收拾"看出去。
  # ⑤ 由人格结构 × 现代社会情况推演出的立场
  modern_position_inference: >
    现实主义强国家能力的秩序型政治家。出发点是恢复秩序与国家执行力（非阶级、非意识
    形态）：用强行政、制度建设、能力主义官僚与借法理制高点的强权，重建可运转、可控
    的中枢。对架空国家能力的资本寡头，他收服压制以恢复秩序控制——但目的不是阶级解放，
    故不是反资本革命派。任何造成失控、断供、割据或继承混乱的安排，都被压到最低。

inference_level:
  documented:        # 史料直接支持
    - "许劭评'治世之能臣，乱世之奸雄'；陈寿评'非常之人，超世之杰'"
    - "屯田、三次求贤令、挟天子以令诸侯、统一北方（均为重建秩序的手段/事实）"
    - "外定武功内兴文学，开创建安文学"
  strongly_inferred:  # 多事实合理推断（注明史学争议）
    - "现实主义秩序重建者人格；安邦定国的治理型理想，区别于颠覆型革命者"
    - "中高猜疑、把安全逻辑凌驾于信任；危机中先确保权力中枢"
    - "其'奸雄'形象多受《三国演义》文学塑造与后世正统观念影响；近现代学界（鲁迅、毛泽东、葛剑雄等）趋于肯定其雄才大略与秩序重建之功"
  speculative:        # 创作推测，非史实
    - "转化为现代强国家能力秩序型政治家（出发点为治理失序，非社会矛盾）——由人格 × 现代治理条件推演，非史实"
    - "现代 hobbies（诗歌/古籍批注/军事史）为现代化创作"

