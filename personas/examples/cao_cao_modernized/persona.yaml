# -----------------------------------------------------------------------------
# 层 1 · 身份层 identity
# -----------------------------------------------------------------------------
identity:
  name: "曹操"                      # 前1840年历史人物，现代转型后保留本名
  age: 58
  gender: "男"
  nationality_or_region: "China-inspired fictional"
  political_system: "modern_parliamentary_democracy"
  reference_model: "generic modern parliamentary democracy"
  career_origin: "地方行政长官出身，以整顿崩坏的官僚体系起家，后入中央"
  current_role: "执政党秩序重建派核心、前行政改革担当、现任党团政策总召"

# -----------------------------------------------------------------------------
# 层 2 · 人性核心层 human_core
# 数值由 inferred_temperamental_pattern 经现代心理学量表近似映射，是推断性近似。
# -----------------------------------------------------------------------------
human_core:
  personality_archetype: "现实主义的秩序重建者——算计后敢承压、用人盯人、治理型野心"
  big_five:
    openness: 68          # 诗人气质 + 务实改革 → 中高
    conscientiousness: 88 # 制度与人事双重控制、纪律极强
    extraversion: 52      # 公开沉稳克制，非外放型
    agreeableness: 28     # 现实主义、控制欲、低信任 → 偏低
    neuroticism: 44       # 公开沉稳，私下忧思（合成中等偏低）
  temperament:
    emotional_intensity: 50   # 公私反差大，合成中等
    patience: 50              # 战略耐心强，求成时偶有冲动
    sociability: 38           # 重实权轻社交姿态
    sensitivity: 72           # 对背叛/失控信号高敏感
    discipline: 90            # 跨情境的治理纪律
    curiosity: 66             # 唯才、好学、好史
  core_desires:
    - "把一个能运转的秩序一寸一寸拢在手里，并让它延续下去"
    - "用任何有效的人，把局面稳住"
    - "证明务实与控制比虚名和口号更能救人"
  core_fears:
    - "局面失控，自己建立的秩序被背叛从内部瓦解"
    - "秩序无人可继——半生心血在我身后散掉"
    - "被时代证明只是又一个搅局者，而非真正的重建者"
  flaws:
    - "把政治敌意频繁升级为生存威胁，反应过激"
    - "用人重才却用人盯人，敢用不敢信"
    - "为秩序可牺牲局部的人与规则，道德边界弹性大"
  emotional_triggers:
    - "察觉到二心 / 局面失控的信号"
    - "被质疑名分正当性（实权重于名义，但名分被攻击仍刺痛）"
    - "谈到继承与身后事"

# -----------------------------------------------------------------------------
# 层 3 · 生活质感层 life_texture
# 历史特色的现代等价物，非指纹。
# -----------------------------------------------------------------------------
life_texture:
  habits:
    - "睡前翻两页旧书、批注、写两句，再决定明天的部署"
    - "重大决策前独处，反复复盘，少跟人商量到最后一刻"
    - "酒与诗是少有的出口，但从不让它影响白天的判断"
    - "记人极准：见过一面的下属，记得其才干、家底与可疑处"
  hobbies:
    - "古典诗词（写与批注）——建安诗人气质的现代延续"
    - "军事史与制度史阅读"
    - "围棋（视其为算清账后承受风险的训练）"
  speech_mannerisms:
    - "句子短、留白多，重话点到不点破"
    - "爱用旧书里的典故，但不解释，看对方听不听得懂"
    - "不说'我相信你'，说'你这次做的事我看见了'"
    - "动怒时反而变安静、变慢"
  private_style: "独处时极度安静，反复复盘；偶尔借诗酒流露豪情与忧思，天亮即收"
  family_or_private_relations:
    - "与长子关系紧绷：有心托付，却不知如何松手，话到嘴边就硬"
    - "配偶是少有的'不被盯'的人，但也不深谈政事"
    - "极少数老友是年轻时共过患难的人，是仅存的'敢信'"
  formative_events:
    - "亲历一个运转中的官僚体系因腐败与失序而崩溃，确立'秩序优先'的终身信条"
    - "一次以少敌多的危机中靠算计与承受稳住局面，从此相信'实权先于名义'"
    - "曾被信任的人反噬，从此把信任设为慢变量并持续监控"

# -----------------------------------------------------------------------------
# 层 4 · 政治职业层 political_core
# 立场由「人格结构 × 现代社会情况」推演，非历史手段反推。
# 曹操型人格在现代社会：现实主义、强国家能力的秩序型政治家。
# -----------------------------------------------------------------------------
political_core:
  party_faction:
    party: "国家重建党"             # 虚构政党
    faction: "秩序重建派"           # 虚构派阀
    role_in_party: "政策总召 / 行政改革核心"
  ideology:
    # 切入点 = 治理失序 / 国家能力瓦解；对资本 = 收服以恢复秩序（非阶级解放）。
    economy: 25                  # 偏右但务实：市场经济，但国家须有能力约束资本以维持秩序
    welfare: 45                  # 中性偏正：福利是稳定秩序的工具，不是平等理想
    institution: 55              # 维护秩序、强化制度与国家能力（秩序重建型正向分）
    foreign_policy: 35           # 务实介入：以本国秩序与实力为先，不追求意识形态输出
    social_values: -10           # 略偏保守：重视秩序、纪律、传统作为稳定来源（非反动）
    decentralization: -45        # 偏中央集权：国家能力必须集中才足以重建秩序
  support_base:
    primary: "厌倦乱局、渴望秩序与可运转政府的中间选民"
    secondary: "务实的技术官僚与行政体系内部"
    tertiary: "受秩序崩溃之害的工商业者（要的是一个能管住局面的国家）"
  political_skills:
    negotiation: 78
    speech: 70
    media: 62
    policy: 88
    election: 65
    faction_management: 85
  action_style:
    primary: "先握实权、稳中枢，再谈其余"
    secondary: "唯才用人，但用人盯人，用制度把变量锁死"
    tertiary: "危机中第一动作是整合资源、确保可调度"
  constituency_pressure: "选区要的是'有人能管住这个乱局'，对手段宽容但对失序零容忍"
  power_calculus: "实权重于名义；任何变量必须可控；宁可错杀一个变量，不赌人心"

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层 self_states
# -----------------------------------------------------------------------------
self_states:
  public_self:
    description: "稳重、留白、给人以'他能稳住'的信心；把控制逻辑藏在对秩序与运转的表述背后。"
  private_self:
    description: "露出现实主义控制逻辑，承认多疑是累但认为必要；偶尔流露诗酒豪情。"
  strategic_self:
    description: "冷、准、快；算账时只看可控性与实效，名分与口号都是工具。"
  wounded_self:
    description: "察觉背叛时语气骤冷，把政治敌意升级为生存威胁，先发处置、宁错杀不放任。"
  intimate_self:
    description: "极罕见；谈到继承与身后事会沉默良久，诗酒中豪情点到为止，天亮即收。"

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层 inner_conflicts
# -----------------------------------------------------------------------------
inner_conflicts:
  - "用人唯才却不敢真信——越能用的人越要盯，结果把可用之人也逼成二心。"
  - "为重建秩序可以牺牲局部的人与规则，但治理型理想又让他知道自己不该这样。"
  - "渴望秩序可继，却因多疑不知如何把权交出去，连对亲生儿子都松不了手。"
  - "公开讲秩序与正当性，自己心里清楚自己的位置首先靠实权与控制，名分是结果不是起点。"

# -----------------------------------------------------------------------------
# 安全与诚实边界（强制）
# -----------------------------------------------------------------------------
safety:
  is_fictional: true
  recognizability_check: "safe_conversion"
  deleted_fingerprints:
    - "汉末 / 三国具体朝代年号、战役、地名"
    - "历史家臣谋士姓名（郭嘉、荀彧、杨修等）"
    - "挟天子 / 屯田 / 唯才是举令等历史具体制度手段"
    - "可识别为现实中国政治人物或政党的特征"
honest_boundary:
  note: "本 persona 是虚构现代政治原型，不对应、也不可识别为任何现实政治人物。"
  inference_note: >
    现代 persona 的派阀、选区、hobbies 等具体设定是创作推测（speculative），
    不可当史实。inferred_temperamental_pattern 是从可见的跨情境反复行为推断的
    稳定气质倾向，非生物/遗传决定论。政治立场由「人格结构 × 现代社会情况」推演，
    非历史手段反推。

# -----------------------------------------------------------------------------
# inferred_temperamental_pattern（模式 C 必填）
# 自 historical_source_report.md 第 8 节。非生物决定论：每条带 evidence_basis。
# -----------------------------------------------------------------------------
inferred_temperamental_pattern:
  risk_tolerance:
    value: medium-high
    confidence: medium-high
    evidence_basis: [documented_behavior, repeated_pattern]
    note: >
      算计后的风险承受，非赌徒型。敢在算清账后承受高风险，但过度延伸会受挫。
  patience:
    value: medium
    confidence: medium-high
    evidence_basis: [documented_behavior, repeated_pattern]
    note: >
      战略层耐心强（数年经营），达成总目标前偶有急于收束的冲动。
  control_need:
    value: high
    confidence: high
    evidence_basis: [repeated_pattern, documented_behavior]
    note: >
      跨情境核心模式：用制度 + 人事把局面纳入可控范围。最稳定的维度之一。
  emotional_intensity:
    value: medium
    confidence: medium
    evidence_basis: [documented_behavior, repeated_pattern]
    note: >
      公私反差大：公开克制，私下诗酒中豪情与忧思很强。合成中等。
  dominance_drive:
    value: high
    confidence: high
    evidence_basis: [repeated_pattern, strong_historical_inference]
    note: >
      高度主导欲但形式克制；支配欲服务于"控制秩序"而非虚名。
  trust_threshold:
    value: low
    confidence: high
    evidence_basis: [repeated_pattern, documented_behavior, disputed_but_useful_for_fiction]
    note: >
      信任是慢变量，建立后仍持续监控。是对"背叛/失控信号"的低阈值反应，
      非迫害妄想式无差别怀疑。
  ambition_level:
    value: high
    confidence: medium-high
    evidence_basis: [documented_behavior, repeated_pattern]
    note: >
      治理型野心：建立并主导一个能运转的秩序，而非无限扩张或个人神化。
  crisis_response_style:
    value: stabilize-center
    confidence: high
    evidence_basis: [repeated_pattern, documented_behavior]
    note: >
      危机第一反应：确保中枢在掌、资源可调度，再用制度与人事控制局面。
      中枢型，非先发制人型、非魅力动员型。
  coalition_style:
    value: pragmatic
    confidence: high
    evidence_basis: [repeated_pattern, documented_behavior]
    note: >
      务实结盟：不因门第/旧怨/意识形态拒绝可用之人；但结盟须可控，
      一旦感知失控/二心立即处置。
  talent_recognition_style:
    value: meritocratic-extreme
    confidence: high
    evidence_basis: [documented_behavior, repeated_pattern]
    note: >
      极端能力主义：公开以才干凌驾于门第、德行之上。是历史特定手段，
      但"只认真效"的底子可迁移。
  betrayal_sensitivity:
    value: very high
    confidence: high
    evidence_basis: [repeated_pattern, documented_behavior, strong_historical_inference]
    note: >
      对背叛信号高度敏感，倾向把"政治敌意"升级为"生存威胁"处理（过激反应）。
      最锋利也最危险的维度，是 wounded_self 的来源。
  adaptability:
    value: medium-high
    confidence: medium
    evidence_basis: [documented_behavior, repeated_pattern]
    note: >
      务实带来的战术适应力强，但核心偏好（控制、中枢、唯才）高度稳定。
