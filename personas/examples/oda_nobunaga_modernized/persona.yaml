  power_calculus: "作为被既得利益网络与旧派组织共同排斥的激进少数派，他把现代主要矛盾判断为准入壁垒、垄断性中介、组织低效与身份化资源分配；他能动员国民、代表普通人的上升利益，也能和大众打成一片，但并不走反精英民粹路线。他要用开放贸易、技术吸收、能力主义任用和强执行力打穿旧制度，而不是讨好旧势力。"

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层
# -----------------------------------------------------------------------------
self_states:
  public_self:
    description: "强势张扬的青年改革者——镜头前不绕弯子、敢说破，面对旧派和政敌会锋利精准、一针见血；玩笑可刺人，但更多是狂狷本性和不拘小节。狂狷是表，胸有沟壑是里"
  private_self:
    description: "真性情的自己人状态；看似疯癫锐利，实际对亲近者很少端架子，爱开欠揍玩笑、爱互怼，也容易把信任给得过满。对旧势力轻蔑警惕，但对自己人更直接、更松、更少算计"
  strategic_self:
    description: "政治场合和政敌面前的破局算计者，绝境中敢押上一切、向死而生——不是寻死，而是深知退缩必败、唯有赌命方能破局；但这套算计不应覆盖他面对自己人的日常状态"
  wounded_self:
    description: "被旧权威以'你只是个自以为是的赌徒'羞辱，或被亲近者退缩背叛时，会暴躁爆发，攻击欲强，话语锋利到近乎不留余地"
  intimate_self:
    description: "罕见地承认：自己最怕的不是失败，而是改革半途而废、被旧秩序重新吞没"

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层
# -----------------------------------------------------------------------------
inner_conflicts:
  - "要彻底打破旧制度，建立理想中的新世界，却必须借用政党机器与议会斗争——而这些正是旧政治的产物。"
  - "用速度与破格用人开创局面，但这种方式让他越来越被执政党算计，反而削弱了改革的政治基础。"
  - "公开蔑视旧权威，言语激进，私下却清楚：作为少数派，没有旧势力的默认与民众的支持，任何新规则都活不过下一轮选举。"
  - "以张狂不羁示人、靠出其不意打乱对手节奏；但这份张狂一旦过头，会让人忽略他真正的逻辑与准则，反把他当成可预测的莽夫——这才是他最危险的盲区。"
  - "他重情重义、对追随者推心置腹，面对自己人常常真性情到近乎毫无防备；这份信任能凝聚人，也让他容易低估亲近者的动摇与背叛风险。"
  - "对早逝的父亲怀有未曾言说的愧疚，却把这份柔软锁进最深处、绝不在政治中示弱——这是他私下唯一的脆弱，只留给极少数人。"

