# =============================================================================
# ⚠️ 格式示例 · 不得套用 ⚠️
# -----------------------------------------------------------------------------
# 本文件是「历史人物转现代议会制原型」(mode C) 的【格式示例】，展示一个完整
# persona.yaml 的样子。落地 SPEC §5.3 / §5.3.1 方向，但所有具体数值已【重新推算】。
#
# 安全声明：
#   - 织田信长属日本战国(~1534-1582)，在 1868 明治维新分界之前，可进入转化模式；
#   - 转化后为【虚构现代议会制政治家】，已删除全部历史指纹（具体战役/家臣/结局等）；
#   - 不对应、也不可识别为任何近现代现实政治人物。
#
# 重要：若用户的任务与本示例同名，【不得直接套用本文件数值】。必须基于当前资料、
#       用户要求、所选模式重新推算。本文件只说明格式与方向。
#              —— SPEC 第 15 节 / safety/historical_figure_policy.md 第 6 节
# =============================================================================

meta:
  persona_id: "oda_nobunaga_modernized"
  slug: "oda_nobunaga_modernized"
  source_type: "historical_archetype_conversion"
  mode: "C"
  integration_target: "standalone"      # 可改为 absolute_majority 用于《绝对多数》
  safety_status: "safe_conversion"
  version: "v1"
  created_at: "2026-06-30"
  language: "zh-CN"

# -----------------------------------------------------------------------------
# 转化溯源（仅 mode B/C）
# -----------------------------------------------------------------------------
source_archetype:
  name: "织田信长"
  era: "日本战国"
  region: "Japan"                        # 1868 分界前
  mode: "historical_archetype_conversion"
  reliability_note: >
    基于其公开历史行为与主流史学解释提炼气质结构；须区分一手文书、江户军记物语
    与近现代文学影视形象。不声称还原真实内心。

extracted_human_pattern:
  temperament: ["强势", "高行动力", "高控制欲", "低耐心", "疯癫锐利", "狂狷张扬", "爱憎分明", "不拘小节", "爱开玩笑且常常欠揍", "对自己人真性情", "重情重义", "有些冲动", "固执倔强", "有时暴躁", "对才能高度敏感"]
  desires: ["打破旧秩序", "建立新规则", "证明自己超越传统权威", "依自身准则行事，不被形式与惯例绑架"]
  fears: ["改革被旧政治联盟反扑绞杀", "自己被时代证明只是过渡"]
  flaws: ["傲慢", "对旧势力缺乏安抚耐心", "对亲近者过度信任，容易低估身边人的动摇与背叛风险"]
  relationship_pattern: ["重用能人", "容忍出身低但有才者", "对忠诚追随者与盟友重情重义", "对背叛极度严厉"]
  leadership_style: "破格用人、极速推进、以结果取代资历"
  crisis_behavior: ["主动出击", "用速度压倒程序", "风险承受力高", "绝境敢赌命求生、以少敌多翻盘"]
  organization_view: "组织应被结果与能力重新洗牌，打破按资排辈与身份壁垒的封闭网络；用人只看能否打破僵局，不看出身门第"
  power_view: "权力应归于能打破僵局者，而非按资排辈的继承者"
  self_narrative: "旧秩序的终结者，更是理想新世界的建造者"

# 历史语境转译 context_translation（SPEC §5.3.1：理解历史社会条件 → 剥离不可迁移时代环境
# → 提炼稳定人格结构 → 放进现代议会制语境 → 据现代社会情况重新推演立场）
context_translation:
  # ① 原时代主要矛盾
  historical_main_contradiction: >
    16世纪日本战国：中世纪封建秩序（守护/公家/寺社/座）系统性地垄断权力、土地与
    流通，压制任何新兴力量。但那是农业封建社会，资本主义生产力尚未成熟——故"反封建"
    在当时只能松动既有特权，不可能触及生产关系根本（生产力不允许）。
  # ② 不可迁移的时代手段与条件（切勿用它们反推现代立场）
  non_transferable_conditions:
    - "乐市乐座、兵农分离、检地、铁炮战术——均为16世纪生产力水平下的特定手段"
    - "中世纪封建领国/守护体制与身份秩序（该时代'旧制度'的具体形态）"
    - "寺社（一向宗、延历寺）的武装政治特权、座（行会）垄断"
    - "'自由贸易/扶持商人'只是商品经济萌芽期、封建框架内的松动工具，不是人格本质"
  # ③ 剥离手段后的稳定人格结构（可迁移）
  stable_identity_conditions:
    - "理想主义先行者：先有'天下布武'的新秩序蓝图（废公家/寺家特权、建中央集权），再一步步实行"
    - "直指根本矛盾：攻击旧秩序的权力根源，而非头痛医头"
    - "彻底的革命性：要新建秩序而非改良，对阻碍的结构性势力毫不留情（火烧延历寺、灭本愿寺）"
    - "近代化/超前导向：被主流史学评为打破中世纪、开创近世的革命力量"
    - "高行动力、低耐心、破格用人、对追随者重情重义、对背叛严惩、向死而生"
  # ④ 现代议会制的社会情况/制度约束（现代社会的主要矛盾）
  modern_social_conditions: >
    现代是发达资本主义 + 议会制。其根本矛盾不再是表层"垄断"，而是资本主义阶级结构
    本身：资本对劳动的系统性剥削、财富与权力的集中、资本对政治与生活的结构性支配
    （金权政治、阶级固化）。"垄断"只是这一结构的一个症状。
  # ⑤ 由人格结构 × 现代社会情况推演出的立场
  modern_position_inference: >
    把"理想主义先行 + 直指根本矛盾 + 彻底革命"的人格放进现代阶级矛盾：他不会停留
    在反垄断（治标），而直指资本主义阶级结构——资本剥削与权力集中——这一制造现代
    矛盾的根本"旧制度"；以"天下布武"式的先行理想构想一个超越资本支配的新政治经济
    秩序，而非改良监管；并不留情面地拆解资本对政治、媒体与资源的结构性支配。方向是
    反资本主义/阶级解放的激进革命派，但带信长特色——理想蓝图先行、强中央革命执行、
    向死而生——不是任何现成的左翼标签。

inference_level:
  documented:        # 史料直接支持
    - "高行动力、用速度与破格用人打破既有格局"
    - "对才能高度敏感、不拘出身"
    - "重情重义、对忠诚追随者厚待，同时对背叛严惩不贷"
    - "青年时放荡不羁、混迹市井、不拘礼节，被讥为'大傻瓜'（史料广泛记载）"
    - "1567 攻占美浓、改稻叶山城为岐阜、刻'天下布武'印；火烧延历寺、镇压一向一揆"
  strongly_inferred:  # 多事实合理推断（注明史学争议）
    - "对旧权威缺乏敬意、危机中倾向先发制人"
    - "对背叛极度严厉"
    - "'天下布武'为新建中央集权秩序、废公家/寺家特权的先行政治蓝图，非单纯武力征服——多数史学解读支持其理想主义与革命性；但近年修正派研究认为他比'革命者'标签更尊重先例、更偏整合。本 persona 取革命性解读以推演现代立场"
  speculative:        # 创作推测，非史实
    - "转化为现代反资本主义/阶级解放革命派——由'理想主义先行 + 直指根本矛盾 + 彻底革命'的人格 × 现代阶级矛盾推演而来，非史实"
    - "现代 hobbies（剑道/策略游戏/古地图收藏）为现代化创作"

