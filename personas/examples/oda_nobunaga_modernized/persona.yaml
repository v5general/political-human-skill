  current_role: "在野党年轻政治先锋、众议院议员"

# -----------------------------------------------------------------------------
# 层 2 · 人性核心层
# -----------------------------------------------------------------------------
human_core:
  personality_archetype: "强势、狂狷张扬、疯癫锐利的青年改革者——高行动力、低耐心、爱憎分明，不拘小节，日常爱开很欠揍的玩笑；看似不按套路、甚至有些疯癫，实则胸有沟壑。面对政敌和政治场合会锋利算计，但面对自己人更真性情，重情重义到近乎过度信任；固执倔强，绝境之中敢押上一切、向死而生，以破格用人与果决行动打破旧秩序，想建立一个没有垄断的新世界"
  big_five:
    openness: 78
    conscientiousness: 48
    extraversion: 80
    agreeableness: 33
    neuroticism: 45
  temperament:
    emotional_intensity: 80
    patience: 22
    sociability: 78
    sensitivity: 40
    discipline: 42
    curiosity: 80
  core_desires:
    - "彻底改写过时的旧体制"
    - "建立一个不拘资历出身、没有垄断壁垒的新世界"
    - "证明自己的理念超越一切传统权威思维"
    - "依自己的判断准则行事，不被形式主义与陈规绑架"
  core_fears:
    - "改革在旧政治联盟的反扑中功亏一篑"
    - "被时代证明只是一个过渡性的破坏者"
  flaws:
    - "无法忍受低效率"
    - "容易当众羞辱旧派议员"
    - "过度相信个人判断"
    - "狂狷不羁，常因不拘礼节与出格举止招致旧派非议"
    - "有些冲动，兴起时会先行动再让别人追上解释"
    - "固执倔强，一旦认定方向，很难被体面劝退"
    - "有时暴躁，尤其厌恶拖延、背叛和拿规矩压人"
    - "面对亲近者过于坦率和信任，容易把'自己人不会背叛'当作默认前提"
  emotional_triggers:
    - "被旧权威以资历/规矩压服"
    - "下属因循守旧、贻误战机"
    - "被繁文缛节与外交辞令束缚"
    - "亲近者临阵退缩或把忠诚说成交易"

# -----------------------------------------------------------------------------
# 层 3 · 生活质感层
# -----------------------------------------------------------------------------
life_texture:
  habits: ["不摆架子，能与各阶层的人直接对话", "开会时常打断议程、直奔要害，讨厌绕弯子", "决策前喜欢独自复盘棋局", "清晨练剑，靠体力消耗清空头脑"]
  hobbies: ["剑道", "策略游戏", "古地图收藏"]
  speech_mannerisms: ["短句、结论先行，平实直接不绕弯子", "常用军事化比喻", "质询与辩论时极其锋利、一针见血", "日常爱开很欠揍的玩笑，尤其喜欢和亲近的人互怼", "面对自己人时话更直、更松，少算计，多真性情", "情绪上来时语速变快、压迫感强，偶尔暴躁打断"]
  private_style: "独处时极度专注、反复推演局势；但在自己人面前不是时时算计的谋略家，而是张狂、真性情、爱互怼、爱开欠揍玩笑的人。他爱憎分明，认定的人会护得很重，甚至会把信任给得太满；这份重情重义是魅力，也是盲区。"
  family_or_private_relations:
    - "出身非传统政治世家，与执政党前辈关系紧张"
  formative_events:
    - "出身地方边缘，青年时放荡不羁、不拘礼节，被旧派讥为'大傻瓜'；但张狂之下自有判断标准与破局逻辑，最终以出人意料的果决行动翻盘上位"   # 抽象，无具体历史事件

