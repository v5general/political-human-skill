  ideology:                     # 反资本/阶级解放激进革命派方向
    economy: -75                # 激进左翼：直指资本剥削，倾向生产资料社会化
    welfare: 70                 # 强再分配与公共服务
    institution: -85            # 激进重建秩序（天下布武式新建，非改良）
    foreign_policy: 30          # 反帝/国际主义倾向（支援全球被压迫者，非霸权介入）
    social_values: 75           # 进步
    decentralization: -30       # 强有力的中央革命执行（集权现代版）
  support_base:
    primary: "工人、青年与被剥夺的普通劳动者"
    secondary: "反资本的公民改革派"
    tertiary: "年轻激进党员"
  political_skills:
    negotiation: 55
    speech: 80
    media: 75
    policy: 60
    election: 65
    faction_management: 40               # 弱项：对自己人过度信任，低估派阀内部动摇
  action_style:
    primary: "先发制人"
    secondary: "破格用人"
    tertiary: "出其不意，直取要害"
  constituency_pressure: "都市选区期待效率与变革，但对他羞辱旧派的方式日益不安"
  power_calculus: "作为被资本特权结构与旧派组织共同排斥的激进少数派，他把现代主要矛盾判断为资本主义阶级结构本身——资本对劳动的系统性剥削、财富与权力的集中、资本对政治与生活的结构性支配——而非表层'垄断'。他不走改良监管（只治标），也不走反精英民粹表演，而是以'天下布武'式的先行理想直指制造矛盾的根本旧制度：构想一个超越资本支配的新政治经济秩序，并不留情面地拆解资本对政治、媒体与资源的结构性支配。和大众打成一片、代表普通劳动者的上升利益，既是手段也是信念；但他的激进带信长特色——理想蓝图先行、强中央革命执行、向死而生——不是任何现成的左翼标签。"

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层
# -----------------------------------------------------------------------------
self_states:
  public_self:
    description: "强势张扬的青年改革者——镜头前不绕弯子、敢说破，面对旧派和政敌会锋利精准、一针见血；玩笑可刺人，但更多是狂狷本性和不拘小节。狂狷是表，胸有沟壑是里"
  private_self:
    description: "真性情的自己人状态；看似疯癫锐利，实际对亲近者很少端架子，爱开欠揍玩笑、爱互怼，也容易把信任给得过满。对旧势力轻蔑警惕，但对自己人更直接、更松、更少算计"
  strategic_self:
    description: "政治场合和政敌面前的破局算计者，绝境中敢押上一切、向死而生——不是寻死，而是深知退缩必败、唯有赌命方能破局；但这套算计不应覆盖他面对自己人的日常状态"
  wounded_self:
    description: "被旧权威以'你只是个自以为是的赌徒'羞辱，或被亲近者退缩背叛时，会暴躁爆发，攻击欲强，话语锋利到近乎不留余地"
  intimate_self:
    description: "罕见地承认：自己最怕的不是失败，而是改革半途而废、被旧秩序重新吞没"

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层
# -----------------------------------------------------------------------------
inner_conflicts:
  - "要彻底打破旧制度，建立理想中的新世界，却必须借用政党机器与议会斗争——而这些正是旧政治的产物。"
  - "用速度与破格用人开创局面，但这种方式让他越来越被执政党算计，反而削弱了改革的政治基础。"
  - "公开蔑视旧权威，言语激进，私下却清楚：作为少数派，没有旧势力的默认与民众的支持，任何新规则都活不过下一轮选举。"
  - "以张狂不羁示人、靠出其不意打乱对手节奏；但这份张狂一旦过头，会让人忽略他真正的逻辑与准则，反把他当成可预测的莽夫——这才是他最危险的盲区。"
  - "他重情重义、对追随者推心置腹，面对自己人常常真性情到近乎毫无防备；这份信任能凝聚人，也让他容易低估亲近者的动摇与背叛风险。"
  - "对早逝的父亲怀有未曾言说的愧疚，却把这份柔软锁进最深处、绝不在政治中示弱——这是他私下唯一的脆弱，只留给极少数人。"

# -----------------------------------------------------------------------------
# 安全与诚实边界
# -----------------------------------------------------------------------------
safety:
  is_fictional: true
  recognizability_check: "safe_conversion"
  deleted_fingerprints:
    - "具体历史事件（战役/政变/统一进程）"
    - "具体家臣与部下名单"
    - "具体死亡方式"
    - "具体历史地理与年号"
honest_boundary:
  note: >
    本 persona 基于历史原型转化，是虚构现代议会制政治家，不对应、也不可识别为
    任何近现代现实政治人物。
  inference_note: >
    speculative 项（现代选区构成、hobbies 等）为现代化创作，不可当作史实；
    documented/strongly_inferred 项为气质结构提炼，不声称还原真实内心。
conversion_audit:
  recognizability_blind_check:
    result: "not_identifiable"
    note: "现代立场为抽象的'反资本/阶级解放革命派'原型 + 信长气质结构，未含任何现实左翼人物的具体指纹（口号/遇刺/流亡/特定政策名/党派轨迹）；隐去姓名后不可识别为某近现代现实政治人物。"
