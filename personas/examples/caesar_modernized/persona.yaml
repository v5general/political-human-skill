# 历史语境转译 context_translation（SPEC §5.3.1：理解历史社会条件 → 剥离不可迁移时代环境
# → 提炼稳定人格结构 → 放进现代议会制语境 → 据现代社会情况重新推演立场）
context_translation:
  # ① 原时代主要矛盾
  historical_main_contradiction: >
    罗马共和国末期：元老院寡头（optimates）系统性地垄断政治权力、土地与晋升通道，
    共和国的制衡程序已被少数家族掏空；而扩张带来的财富与老兵、平民、新公民的诉求
    涌入，旧制度既无法吸纳也无法压制。凯撒的立场是这一矛盾下的产物——他用 populares
    （平民派）路线、个人魅力与军事胜利撬动寡头垄断。
  # ② 不可迁移的时代手段与条件（切勿用它们反推现代立场）
  non_transferable_conditions:
    - "populares（平民派）路线、公民大会绕开元老院——均为罗马共和国政制下的特定手段"
    - "老兵分地、殖民分配、债务重组——前资本主义农业社会的土地与债务问题，非现代再分配"
    - "前三头同盟、军事独裁官、终身独裁官 Dictator perpetuo——共和国晚期的非常规权力工具"
    - "高卢征服、跨卢比孔河、内战——具体的军事手段与罗马地缘结构，不可迁移"
    - "公民权扩展、元老院扩容——罗马公民权与元老院体制特有的政治操作"
    - "'平民派/给底层实惠'只是罗马共和国末期的夺权杠杆，不是人格本质，不反推现代左翼立场"
  # ③ 剥离手段后的稳定人格结构（可迁移）
  stable_identity_conditions:
    - "使命感驱动的野心家：把个人追求升华为'成就历史级伟业'的使命，相信自己的命运与国运绑定"
    - "魅力型群众动员者：以个人魅力、慷慨与雄辩直接诉诸民众，绕过僵化的精英协商"
    - "制度边界感弱：当程序挡在使命之前时，倾向架空程序而非放弃使命；个人使命高于制度制衡"
    - "现实主义赌徒：精明计算与豪赌并存，危机中以大胆行动重置局面（bold-reset）而非渐进妥协"
    - "自我神话化：以宏大叙事组织追随者，把自己的经历讲成国家命运的章节"
    - "以荣誉与慷慨绑定追随者：同盟以个人威望维系，制度化传承弱"
    - "对制度性拖延低耐心、对长期战略目标高持久"
  # ④ 现代议会制的社会情况/制度约束（现代社会的主要矛盾）
  modern_social_conditions: >
    现代是发达资本主义 + 议会制。其核心张力之一是：僵化的精英共识与程序惯性
    （两党/多党的建制派协商、官僚系统的路径依赖、金权与资源的集中）挡在一切大刀阔斧的
    改革之前，让国家陷入"什么都改不动"的低效僵局。民众对旧政治精英的不满、对"谁能真正
    把事情做成"的渴望，构成可被魅力型领袖动员的政治能量。这与罗马共和国末期"寡头堵死
    改革通道、民众期待强人破局"的结构有抽象的相似性（仅结构相似，手段不可迁移）。
  # ⑤ 由人格结构 × 现代社会情况推演出的立场
  modern_position_inference: >
    把"使命感驱动 + 魅力动员 + 制度边界感弱 + 现实主义赌徒 + 自我神话化"的人格
    放进"精英共识与程序惯性堵死改革、民众渴望破局者"的现代语境：他看到的不是阶级剥削
    （那是革命者人格的视角），而是"成就伟业的机会"——僵化的精英挡在那里，民众的期待
    堆在那里，一个敢于破局的人可以把二者接上，做成前人做不成的事。他的改革动力来自
    "留名青史的伟业"而非阶级解放；再分配、福利、公共服务扩张是他借民意成就伟业、
    把追随者绑定到自己身上的杠杆（populares 老兵分地的现代等价物），而非出于阶级立场。
    他会强势推进再分配与大政府——但目的是积攒个人威望与政治资本，用以架空挡路的制度
    制衡、把自己的使命写进国家议程。方向是"使命感魅力型强人改革领袖"：经济左倾、福利
    扩张、制度激进改革（突破而非维护程序）、社会进步（动员新选民）、强中央执行；但这一切
    带凯撒特色——把个人动机升华为国运、以魅力绕过精英、逐步架空制度制衡——不是任何
    现成的左翼/右翼标签。

inference_level:
  documented:        # 史料直接支持
    - "高野心/limitless ambition——史家近乎一致评其"
    - "populares 路线、土地分配、债务改革、公民权扩展"
