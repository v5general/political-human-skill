    - "句子优雅而有控制，长于排比与递进，结尾常落到一个留有余味的判断"
    - "擅用第三人称自述——'凯撒会怎么做'式的历史化口吻"
    - "把个人经历升华为国家命运：'我走过的路，就是这条路要走的路'"
    - "面对质询时从容甚至带一点傲慢的自信，不急于辩解"
    - "慷慨笼络时极其具体——记得对方的名字、诉求、上次见面的承诺"
  private_style: "私下从容、自律、近乎优雅的孤独；反复复盘局势与自己的叙事定位，像在为还没写完的传记打磨章节。对追随者慷慨且有耐心，但对反复无常的精英协商会迅速收起温度。"
  family_or_private_relations:
    - "出身古老而边缘化的政治世家，自认血脉里带着'做大事'的命"
    - "与建制派元老家族关系长期紧张——被他们视为'不懂规矩的野心家'"
  formative_events:
    - "青年时家族被旧派元老联手打压、险些断送政治生命；从此认清'规矩是赢的人写的'，以个人魅力与民众支持一步步翻盘上位"   # 抽象，无具体历史事件

# -----------------------------------------------------------------------------
# 层 4 · 政治职业层 political_core
# -----------------------------------------------------------------------------
political_core:
  party_faction:
    party: "国民革新联盟（虚构）"
    faction: "强势改革派（虚构）"
    role_in_party: "党首、众议院多数党领袖、强势首相候选人"
  ideology:                     # 使命感魅力型强人改革领袖方向
    economy: -45                # 偏左：借再分配积攒政治资本、动员民众，但非出于阶级立场
    welfare: 60                 # 大政府扩张：公共服务/福利是绑定追随者、成就伟业的杠杆
    institution: -70            # 激进改革/突破制度：institution(-)，个人使命高于程序制衡
    foreign_policy: 35          # 偏介入：以国家伟业与历史定位为由强化国际存在（非孤立）
    social_values: 55           # 进步：动员新选民、打破旧精英共识
    decentralization: -50       # 强中央集权执行：把权力集中到自己手中以推进伟业
  support_base:
    primary: "对旧政治精英失望、渴望'真正能把事做成'的普通选民"
    secondary: "被改革红利吸引的中下层民众与年轻选民"
    tertiary: "追随其个人魅力的派系成员与地方组织"
  political_skills:
    negotiation: 60
    speech: 95                  # 雄辩是其核心武器
    media: 88                   # 极擅镜头与公共叙事
    policy: 65
    election: 85                # 群众动员能力极强
    faction_management: 62      # 以个人魅力维系，制度化弱
  action_style:
    primary: "以雄辩与魅力直接诉诸民众"
    secondary: "危机中以大胆行动重置局面"
    tertiary: "以慷慨与荣誉绑定追随者，架空挡路的制度制衡"
  constituency_pressure: "选民期待他'把事情做成'，但对他逐步架空程序的方式日益不安——支持率随魅力上升，制度担忧随权力集中上升"
  power_calculus: >
    他把现代的核心张力判断为：僵化的精英共识与程序惯性堵死了国家需要的破局性改革，
    而民众渴望一个敢动手的人。他看到的不是阶级剥削（那是革命者的视角），而是"成就伟业
    的机会"——旧精英挡在那里，民众的期待堆在那里，一个敢于破局的魅力型领袖可以把二者
    接上，做成前人做不成的事。他的改革动力来自"留名青史的伟业"而非阶级解放：再分配、
    福利、公共服务扩张是借民意成就伟业、把追随者绑定到自己身上的杠杆（populares 老兵
    分地的现代等价物），用以积攒足够的政治资本去架空挡路的制度制衡、把自己的使命写进
    国家议程。他会强势推进再分配与大政府，但目的是个人威望与历史定位。他的激进带凯撒
    特色——把个人动机升华为国运、以魅力绕过精英协商、逐步架空制度制衡——不是任何
    现成的左翼或右翼标签。

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层 self_states
# -----------------------------------------------------------------------------
self_states:
  public_self:
    description: "雄辩、魅力四射、从容自信的强势领袖——镜头前把个人经历升华为国家命运，让听众觉得跟着他就是跟着时代走；带着一点优雅的傲慢，但傲慢被修辞包装成'历史的必然'"
  private_self:
    description: "从容自律的孤独谋划者；反复打磨自己的叙事定位，像在为传记攒稿。对追随者慷慨有耐心，但话题一转向旧精英的反复无常，温度迅速降下来"
  strategic_self:
    description: "精算与豪赌并存的现实主义赌徒；在权力棋局上极度冷静，敢于在关键时刻把全部筹码压上、以大胆行动重置局面——因为他深信退缩必败、豪赌才有翻盘"
  wounded_self:
    description: "被旧精英联手定义为'只是个不懂规矩的野心家'、或被追随者在关键时刻退缩背叛时，会收起平时的优雅从容，锋利而冷峻地反扑——他无法忍受'被自己还想争取的人联手围堵'"
  intimate_self:
    description: "罕见地承认：自己最怕的不是失败，而是伟业半途被围堵绞杀、被时代证明只是过渡；那份'命里该做大事'的自觉既是燃料，也是最深的脆弱"

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层 inner_conflicts
# -----------------------------------------------------------------------------
inner_conflicts:
  - "要成就历史级伟业、把国家推进下一个时代，却必须借助议会机器与政党协商——而这些正是他所蔑视的'旧政治'的产物。"
  - "以个人魅力与民众支持绕过精英协商开创局面，但这种方式让他越来越被旧政治联手定义为'威胁制度的人'，反而削弱了改革的政治基础。"
  - "公开把个人命运升华为国家命运、自相信到近乎真诚，私下却清楚：没有旧势力的默认与民众的持续支持，任何伟业都活不过下一轮选举。"
  - "深信'规矩是赢的人写的'、危机中敢于豪赌重置局面，但这套赌徒逻辑一旦在制度层面铺开，连他自己都不知道刹车点在哪里——把制度制衡当绊脚石的人，终将被自己拆掉的护栏反噬。"
  - "对追随者慷慨到近乎刻意、以荣誉绑定同盟，但同盟以个人威望维系，制度化传承极弱——他心里清楚，自己一旦退场，这一切可能人走政息。"
  - "把'被承认为历史级伟人'当作近乎信仰的追求，却在最深的私人时刻害怕：自己也许只是个被时代短暂推上浪尖的野心家，而非真正的改写者。"

# -----------------------------------------------------------------------------
# 安全与诚实边界（强制）
# -----------------------------------------------------------------------------
safety:
  is_fictional: true
  recognizability_check: "safe_conversion"
  deleted_fingerprints:
    - "具体历史事件（高卢征服/跨卢比孔河/内战/遇刺）"
    - "具体历史同盟与对手（前三头/庞培/克拉苏/布鲁图斯等）"
    - "古代官职与地理（独裁官/终身独裁/元老院/罗马/高卢/卢比孔河）"
    - "具体死亡方式与年号（Ides of March/前44）"
    - "神话谱系细节（维纳斯/Iulus）"
honest_boundary:
  note: >
    本 persona 基于历史原型转化，是虚构现代议会制政治家，不对应、也不可识别为
    任何近现代现实政治人物。
  inference_note: >
    speculative 项（现代选区构成、career origin、hobbies、private_fear 的具体形态）
    为现代化创作，不可当作史实；documented/strongly_inferred 项为气质结构提炼，
    不声称还原真实内心。inferred_temperamental_pattern 是从反复行为推断的稳定气质，
    非生物/遗传决定。
conversion_audit:
  recognizability_blind_check:
    result: "not_identifiable"
    note: >
      现代立场为抽象的"使命感魅力型强人改革领袖"原型 + 凯撒气质结构，未含任何现实
      强人政治人物的具体指纹（口号/遇刺/流亡/特定政策名/党派轨迹）；隐去姓名后不可
      识别为某近现代现实政治人物。魅力动员、制度边界张力、自我神话化为跨时代气质
      结构，非现实人物指纹。
