    - "制度边界感弱：绕开元老院、任终身独裁、扩容元老院架空制衡——其个人使命凌驾程序"
    - "现实主义赌徒：精明计算与豪赌并存，危机中 bold-reset"
    - "自我神话化：第三人称自述、嵌入神话谱系、把行动包装为历史使命"
    - "'解放者 vs 暴君'之争：主流多取复杂人物立场（既推动改革也终结共和制衡）"
  speculative:        # 创作推测，非史实
    - "转化为现代'使命感魅力型强人改革领袖'——由人格 × 现代社会情况推演而来，非史实"
    - "现代 hobbies（古典文学/演讲术研习/历史传记）为现代化创作"
    - "private_fear（被旧精英联手围堵的抽象恐惧）为创作化抽象，不指向具体遇刺结局"

