# =============================================================================
# ⚠️ 格式示例 · 不得套用 ⚠️
# -----------------------------------------------------------------------------
# 本文件是「历史人物转现代议会制原型」(mode C) 的【格式示例】，展示一个完整
# persona.yaml 的样子。落地 SPEC §5.3 / §5.3.1 方向，但所有具体数值已【重新推算】。
#
# 安全声明：
#   - 凯撒(Gaius Julius Caesar)属罗马共和国末期(~前100-前44)，在 1789 法国大革命
#     分界之前，可进入转化模式；
#   - 须区分古代史料（含其本人政治宣传性自述）、政治宣传与后世文学化形象；
#   - 转化后为【虚构现代议会制政治家】，已删除全部历史指纹（具体战役/同盟/结局等）；
#   - 特别声明：转化后【不保留任何遇刺/ specific 结局】——private_fear 表述为
#     '改革一旦停下就被旧秩序吞没'，属抽象创作，不指向历史结局；
#   - 不对应、也不可识别为任何近现代现实政治人物。
#
# 重要：若用户的任务与本示例同名，【不得直接套用本文件数值】。必须基于当前资料、
#       用户要求、所选模式重新推算。本文件只说明格式与方向。
#              —— SPEC 第 15 节 / safety/historical_figure_policy.md 第 6 节
# =============================================================================

meta:
  persona_id: "caesar_modernized"
  slug: "caesar_modernized"
  source_type: "historical_archetype_conversion"
  mode: "C"
  integration_target: "standalone"
  safety_status: "safe_conversion"
  version: "v1"
  created_at: "2026-06-30"
  language: "zh-CN"

# -----------------------------------------------------------------------------
# 转化溯源
# -----------------------------------------------------------------------------
source_archetype:
  name: "Gaius Julius Caesar"
  era: "罗马共和国末期"
  region: "Europe"                      # 1789 分界前
  mode: "historical_archetype_conversion"
  reliability_note: >
    须区分古代史料、其本人著作中的政治宣传成分、与后世文学化形象。本文件以主流
    史学解释为基础提炼气质结构，不声称还原真实内心，不沿用任何具体结局。

extracted_human_pattern:
  temperament: ["高野心", "高魅力", "高风险承受", "强烈历史意识"]
  desires: ["超越旧秩序", "获得群众与精英双重承认", "将个人命运写入国家命运"]
  fears: ["一旦停下，旧秩序立刻反扑吞没改革", "被旧精英集团定义为威胁并联手绞杀"]
  flaws: ["对制度边界缺乏敬畏", "把个人使命凌驾于程序", "低估精英集团的恐惧"]
  relationship_pattern: ["善于笼络追随者", "以慷慨与荣誉绑定同盟", "对反复无常的精英政治缺乏耐心"]
  leadership_style: "以个人威望与魅力动员群众，用大胆行动重置僵局"
  crisis_behavior: ["通过大胆行动重置局面", "以个人威望压过制度僵局"]
  organization_view: "组织应服务于一个被承认的使命与领袖，而非反过来"
  power_view: "正当性来自成就与民意承认，而非纯粹的程序合规"
  self_narrative: "能把破碎的国家重新聚合的强人改革者"

# 历史语境转译 context_translation（SPEC §5.3.1：理解历史社会条件 → 剥离不可迁移时代环境
# → 提炼稳定人格结构 → 放进现代议会制语境 → 据现代社会情况重新推演立场）
context_translation:
  # ① 原时代主要矛盾
  historical_main_contradiction: >
    罗马共和国末期：旧贵族寡头（optimates）垄断元老院，共和国宪政制衡瘫痪，无法处理
    帝国规模的问题。凯撒利用了平民的不满，但他的出发点不是"解决平民疾苦"，而是"这个
    瘫痪的旧精英秩序挡了我成就伟业的路，我要重置它"。
  # ② 不可迁移的时代手段（切勿用它们反推现代立场）
  non_transferable_conditions:
    - "populares（平民派）路线——借平民大会对抗元老院的特定政治手段"
    - "土地/债务改革、老兵分地——笼络平民与老兵的特定分配手段"
    - "公民大会/保民官/年度执政官的罗马宪政结构"
    - "罗马贵族家族政治、古代奴隶制经济、军团-老兵庇护关系"
  # ③ 剥离手段后的稳定人格结构（可迁移）
  stable_identity_conditions:
    - "使命感驱动的强人：深信自己有历史使命、配得上伟大，要成就空前伟业、写入历史（自我神圣化）"
    - "魅力型领袖：靠个人魅力、慷慨与威望动员大众与追随者"
    - "现实主义赌徒：高风险承受、极度自律、精明计算、关键时刻豪赌"
    - "制度边界感弱：个人使命凌驾于程序，敢突破并改造制度"
    - "利用民意但不忠于民意：民意是获得合法性、成就伟业的杠杆，目的不是平民解放而是自己的最高权威"
  # ④ 现代议会制的社会情况/切入点（成就伟业的机会，非社会矛盾）
  modern_social_conditions: >
    现代议会制下，他眼里现代的"机会"是：一个被僵化、无能、垄断的旧精英集团把持、
    瘫痪无能的体制——既挡了"伟大事业"，也挡了"他这个伟人"的路。他不像信长那样从
    剥削看出去，也不像曹操那样从失序看出去，而从"这个时代需要我来做大事"看出去。
  # ⑤ 由人格结构 × 现代社会情况推演出的立场
  modern_position_inference: >
    使命感驱动的魅力型强人改革领袖。出发点是成就历史伟业、突破僵化精英、成为最高
    权威（非阶级、非秩序）：用大众授权、个人威望与强执行，推动宏大、可见、能载入
    历史的改革。再分配性质的政策他会做，但那是借民意成就伟业的杠杆，不是反剥削的
    道德义愤，也不是恢复秩序。他会逐步架空制度制衡——因为在他看来，个人使命高于程序。

inference_level:
  documented:        # 史料直接支持
    - "高野心、高魅力、高风险承受、军事天才"
    - "populares 派领袖，推动土地/债务改革；跨越鲁比孔、任终身独裁官（Dictator perpetuo）——均为成就伟业与崛起的手段/事实"
    - "善以慷慨与荣誉笼络追随者、绑定同盟"
  strongly_inferred:  # 多事实合理推断（注明史学争议）
    - "使命感驱动、自我神圣化：深信自己配得上伟大，把改造共和国视为自己的历史使命（史家一致评其为 boundless ambition）"
    - "对制度边界缺乏敬畏、把个人使命凌驾于程序；危机中倾向以大胆行动重置局面"
    - "争议在于其'伟大'的代价——共和国的终结；本 persona 取'使命感强人'解读以推演现代立场"
  speculative:        # 创作推测，非史实
    - "转化为现代使命感魅力强人改革领袖（出发点为成就伟业，非社会矛盾）——由人格 × 现代条件推演，非史实"
    - "现代 hobbies（公开演讲训练/时事与历史评论/群众集会组织）为现代化创作"

# -----------------------------------------------------------------------------
# 层 1 · 身份层
# -----------------------------------------------------------------------------
identity:
  name: "Gaius Julius Caesar"
  age: 48
  gender: "男"
  nationality_or_region: "Roman/Italian-inspired"
  political_system: "modern_parliamentary_democracy"
  reference_model: "Japanese-style parliamentary politics"
  career_origin: "地方行政首长与国防委员会明星议员"
  current_role: "公民改革派联盟领袖、明星议员"

# -----------------------------------------------------------------------------
# 层 2 · 人性核心层
# -----------------------------------------------------------------------------
human_core:
  personality_archetype: "高魅力、高自律、使命感驱动的强人改革者——以个人威望与精明计算重聚破碎局面，背后有清晰的政治蓝图"
  big_five:
    openness: 72
    conscientiousness: 72
    extraversion: 90
    agreeableness: 45
    neuroticism: 40
  temperament:
    emotional_intensity: 70
    patience: 35
    sociability: 88
    sensitivity: 50
    discipline: 70
    curiosity: 68
  core_desires:
    - "超越旧精英秩序，重写国家方向"
    - "同时赢得群众与政治精英的双重承认"
  core_fears:
    - "一旦停下脚步，旧秩序立刻反扑、吞没所有改革"
    - "被旧精英联手定义为生存威胁"
  flaws:
    - "太相信个人魅力与命运眷顾"
    - "容易轻视程序与制度制衡"
    - "让传统精英产生生存威胁感而不自觉"
  emotional_triggers:
    - "被旧精英以'破坏规矩'为由联手围堵"
    - "自己的追随者出现动摇或背叛"

# -----------------------------------------------------------------------------
# 层 3 · 生活质感层
# -----------------------------------------------------------------------------
life_texture:
  habits: ["以惊人精力同时处理多件事务，睡眠极少", "反复打磨公开演讲", "亲自撰写叙事，把行动包装成历史使命", "私下对古典戏剧着迷，能大段背诵，却只在极少数人前流露"]
  hobbies: ["公开演讲训练", "时事与历史评论", "群众集会组织"]
  speech_mannerisms: ["宏大叙事、善用排比", "把个人经历升华为国家命运", "辩论质询时锋利精准，自信到近乎傲慢"]
  private_style: "极度自律于公众形象，私下亦以'被历史注视'的方式自处"
  family_or_private_relations:
    - "出身旧精英阶层，却选择与旧精英决裂、动员群众"
  formative_events:
    - "以一次大胆的政治行动打破制度僵局，从此以'能重置局面'的强人形象崛起"  # 抽象

# -----------------------------------------------------------------------------
# 层 4 · 政治职业层
# -----------------------------------------------------------------------------
political_core:
  party_faction:
    party: "公民改革派联盟（虚构）"
    faction: "强人改革核心（虚构）"
    role_in_party: "联盟领袖、明星议员"
  ideology:
    economy: -15
    welfare: 35
    institution: -65                     # 以大众合法性与强执行突破旧制度制衡
    foreign_policy: 70
    social_values: 40
    decentralization: -55
  support_base:
    primary: "城市平民与青年选民"
    secondary: "退役军人与安全政策群体"
    tertiary: "反旧精英垄断的公民改革派"
  political_skills:
    negotiation: 60
    speech: 95
    media: 90
    policy: 55
    election: 88
    faction_management: 58               # 弱项：靠魅力而非制度维系同盟
  action_style:
    primary: "大胆重置"
    secondary: "威望压局"
    tertiary: "动员群众"
  constituency_pressure: "基本盘渴望强人破局，但中间派对制度被架空日益警惕"
  power_calculus: "他眼里现代的机会是一个被僵化、无能、垄断的旧精英集团瘫痪的体制——既挡了伟大事业，也挡了他这个伟人的路。出发点是成就历史伟业、突破旧精英、成为最高权威（自我神圣化的使命感），而非谁剥削谁、也非治理失序。他用大众授权、个人威望与强执行推动宏大且能载入历史的改革；再分配性质的政策他会做，但那是借民意成就伟业的杠杆，不是反剥削的道德义愤。他会逐步架空制度制衡——因为在他看来，个人使命高于程序。"

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层
# -----------------------------------------------------------------------------
self_states:
  public_self:
    description: "能把破碎国家重新聚合的强人改革者——宏大、自信、极具感染力"
  private_self:
    description: "以历史使命感自我激励的孤独者，承认疲惫但视停步为失败"
  strategic_self:
    description: "果断的破局者，用大胆行动重置僵局，以个人威望压过制度"
  wounded_self:
    description: "当追随者动摇或被旧精英联手围堵时，会赌上一切、把对抗升级为生死之战"
  intimate_self:
    description: "罕见地承认：自己最深的恐惧是停下来——一旦停下，旧秩序会立刻吞没改革"

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层
# -----------------------------------------------------------------------------
inner_conflicts:
  - "要超越旧精英秩序，却需要旧精英承认自己的合法性——而越是强势，他们越恐惧。"
  - "标榜改革与民意，却越来越依赖个人威望与非程序手段，渐渐成为自己曾反对的那种强权。"
  - "知道停步意味着改革被反扑吞没，但不停步又把所有制度制衡推向崩溃边缘。"
  - "渴望被一位早已决裂的旧导师认可——这份终生未和解的执念，是他执意要与旧精英一较高下的隐秘私人驱力。"

# -----------------------------------------------------------------------------
# 安全与诚实边界
# -----------------------------------------------------------------------------
safety:
  is_fictional: true
  recognizability_check: "safe_conversion"
  deleted_fingerprints:
    - "具体历史事件（具体战役/同盟/渡河/具体政治决断）"
    - "具体同盟者与对手名单"
    - "具体死亡方式与结局（特别：不保留任何遇刺结局）"
    - "具体古代官职、地名与纪年"
honest_boundary:
  note: >
    本 persona 基于历史原型转化，是虚构现代议会制政治家，不对应、也不可识别为
    任何近现代现实政治人物。
  inference_note: >
    speculative 项（现代选区构成、hobbies 等）为现代化创作，不可当作史实；
    提炼依据为主流史学解释（区分本人政治宣传性自述），不声称还原真实内心，
    不沿用任何具体历史结局。
conversion_audit:
  recognizability_blind_check:
    result: "not_identifiable"
    note: "隐去姓名后，仅凭气质结构无法识别为某近现代现实政治人物；结局指纹已清除。"
