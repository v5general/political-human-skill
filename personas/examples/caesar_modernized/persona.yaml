  name: "Gaius Julius Caesar / 凯撒"
  era: "罗马共和国末期（Late Roman Republic）"
  region: "Europe / Mediterranean"        # 1789 分界前
  mode: "historical_archetype_conversion"
  reliability_note: >
    史料充分但成分复杂：须区分本人政治宣传性自述（《高卢战记》《内战记》）、同时代记载
