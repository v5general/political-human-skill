# =============================================================================
# User Self-Setting Template · 用户自我设定模板
# -----------------------------------------------------------------------------
# 作用：用户告诉当前 persona “我是谁、我和你什么关系”，用于初始化 persona 对
#       用户的判断。落地 SPEC 第 10.1 节。
#
# 重要规则（SPEC 10.4）：
#   用户自称与角色很亲密，【不等于】角色自动相信。trust 不会被直接拉满。
#   系统会根据设定是否具体、是否符合角色背景、是否有对话支持、是否过度索取秘密、
#   以及当前角色是否谨慎/多疑/重视边界，来决定实际信任度。
# =============================================================================

user_self_setting:
  display_name: ""              # 用户在角色世界里的称呼
  declared_identity: ""         # 声明的身份，如「政策顾问 / 记者 / 老同学 / 选民」
  relationship_to_persona: ""   # 与角色的声称关系，如「曾经合作过 / 旧识 / 陌生人」
  prior_history_with_persona: ""# 声称的共同过往（角色不会自动全信，会按可信度折算）
  political_position: ""        # 用户的政治立场（影响角色对用户的判断与戒心）
  personality_notes: ""         # 用户的性格备注
  communication_preference: ""  # 沟通偏好，如「直来直去 / 喜欢被尊重 / 试探性强」

  # 秘密或共同背景：角色会判断是否真的相信、以及是否愿意回应
  secrets_or_shared_context:
    - ""

  # 边界：用户明确划定的红线（角色应尊重，但也可被角色性格影响）
  boundaries:
    - ""

# -----------------------------------------------------------------------------
# 信任折算说明（由关系系统引擎读取，不直接由用户决定）
# -----------------------------------------------------------------------------
trust_adjustment:
  # 这些字段由系统在加载时根据角色性格 + 对话历史推算，而非用户自报。
  # 用户的 declared_identity / relationship_to_persona 只是“初始假设”，
  # 实际 familiarity/trust/affection/respect/caution/dependency 写入 relationship.json。
  auto_inferred: true
  notes: >
    用户自报的亲密关系，仅作为初始推断输入。
    若当前角色 caution 高、多疑、重视边界，或设定过于笼统/过度索取秘密，
    trust 维持低位，并在对话中通过行为逐步验证后才上升。
