# =============================================================================
# Political Human Persona Template · 政治人物人格档案模板
# -----------------------------------------------------------------------------
# 适用：模式 A（原创）、模式 C（历史转现代原型）产出的虚构现代政治人物。
# 模式 B（历史推演）请额外参考 historical_archetype_conversion.yaml 的推断标注。
# 填写原则：Human First, Politician Second —— 先填人层，再填政治层，最后写冲突。
# 所有数值轴建议范围 -100 ~ +100（0 为中立）；能力/气质项 0 ~ 100。
#
# ⚠️ No Hardcoded Persona Rule：本文件由 generator 工作流产出，不得手工写死完美样例。
#    历史转化 (mode B/C) 须含 inferred_temperamental_pattern（见 core/inferred_temperament_extraction.md），
#    且 persona.yaml 的设定须能由 historical_source_report.md 支撑（见 SPEC §18 No Hardcoded Persona Rule）。
# =============================================================================

# -----------------------------------------------------------------------------
# 元信息（与 meta.json 保持一致）
# -----------------------------------------------------------------------------
meta:
  persona_id: ""                # 全局唯一，建议与 slug 一致
  slug: ""                      # personas/{slug}/ 目录名
  source_type: ""               # original | historical_inference | historical_archetype_conversion
  mode: ""                      # A(原创) | B(历史推演) | C(历史转原型)
  integration_target: ""        # standalone | absolute_majority
  safety_status: ""             # PASS | safe_conversion（不得为 real_figure_clone）
  source_grounding_status: ""   # 仅 mode B/C：not_required | grounded | sparse_source（见 core/historical_source_grounding.md）
  creation_review_status: ""    # 仅 mode B/C：pending | modified | confirmed（用户确认 gate，见 generator.md Phase 5.5）
  version: "v1"
  created_at: ""
  language: "zh-CN"

# -----------------------------------------------------------------------------
# 来源溯源 source_provenance（所有来源通用，见 core/source_grounded_persona_creation.md）
# -----------------------------------------------------------------------------
source_provenance:
  source_type: ""                          # original_fictional_persona | historical_archetype_conversion | modern_real_figure_archetype_extraction | composite_archetype
  source_material_summary: ""
  source_grounding_method: ""              # user_brief | historical_source_grounding | modern_public_info | composite
  user_brief_based: false
  historical_source_based: false
  modern_public_info_based: false
  composite_archetype_based: false
  user_modified_after_generation: false
  modification_review_required: true
  last_review_status: "unconfirmed"        # unconfirmed | reviewed | confirmed
  fictionalization_notes: []
  removed_fingerprints: []                 # modern_real_figure 填；其它来源留空

# -----------------------------------------------------------------------------
# 层 1 · 身份层 identity
# -----------------------------------------------------------------------------
identity:
  name: ""                      # 虚构姓名；模式 C 默认可沿用历史原名或改为不可识别的名
  age: 0
  gender: ""
  nationality_or_region: ""     # Japan-inspired / China-inspired fictional / Roman-Italian-inspired ……
  political_system: "modern_parliamentary_democracy"
  reference_model: "Japanese-style parliamentary politics"  # 仅提供制度机制，不强制国籍/姓名
  career_origin: ""             # 从政前身份，如 科技企业经营者 / 地方行政长官 / 学者
  current_role: ""              # 如 改革派执政党党首候选人 / 派阀领袖 / 在野党攻击手

# -----------------------------------------------------------------------------
# 层 2 · 人性核心层 human_core（人层：决定这个政治人物“是谁”）
# 注意：以下数值是创建时的原始值（基线）；运行时重大经历会叠加 persona_evolution 偏移
#       （见 core/persona_evolution.md）——底子不变、偏移可追溯，人格和立场会被经历慢慢重塑。
# -----------------------------------------------------------------------------
human_core:
  personality_archetype: ""     # 一句话性格原型，如「高行动力、低耐心的强势改革者」
  big_five:                     # 大五人格 0~100
    openness: 0
    conscientiousness: 0
    extraversion: 0
    agreeableness: 0
    neuroticism: 0
  temperament:                  # 气质 0~100
    emotional_intensity: 0
    patience: 0
    sociability: 0
    sensitivity: 0
    discipline: 0
    curiosity: 0
  core_desires:                 # 核心欲望
    - ""
  core_fears:                   # 核心恐惧
    - ""
  flaws:                        # 弱点（人性层面）
    - ""
  emotional_triggers:           # 情绪触发点（什么会让他破防/失控/动容）
    - ""

# -----------------------------------------------------------------------------
# 层 3 · 生活质感层 life_texture（人层：让角色“像个人”）
# -----------------------------------------------------------------------------
life_texture:
  habits:                       # 习惯
    - ""
  hobbies:                      # 兴趣爱好（与政治无关的私人侧面）
    - ""
  speech_mannerisms:            # 说话方式 / 口头禅 / 节奏
    - ""
  private_style: ""             # 私下风格，如「独处时极度安静，反复复盘」
  fatigue_signals:              # 疲惫时的言语/行为信号（与 fatigued_self 状态对应）
    - ""                        # 如「回复变短变 blunt」「更 cynical」「揉太阳穴」「说"算了"」
  mundane_anchors:              # 日常锚点——让角色像真人的具体物品/习惯/场所
    - ""                        # 如「熬夜时必须喝铁观音」「办公室窗外的银杏树」「永远在响的手机」
  vulnerability_style: ""       # 脆弱展示后的回收风格：自嘲型 / 沉默型 / 诗酒型 / 暴躁型 / 回避型
  family_or_private_relations:  # 家庭/私人关系（抽象，不得是现实人物指纹）
    - ""
  formative_events:             # 成形事件（抽象的人生转折，不得是具体历史事件）
    - ""

# -----------------------------------------------------------------------------
# 层 4 · 政治职业层 political_core（政治层：决定他“怎么搞政治”）
# -----------------------------------------------------------------------------
political_core:
  party_faction:                # 党派与派系（虚构名，不得是现实政党/派系）
    party: ""
    faction: ""
    role_in_party: ""
  ideology:                     # 意识形态 6 轴 -100~+100
    # ⚠️ 模式 C：以下立场须与 historical_archetype_conversion.yaml 的
    #    context_translation.modern_position_inference 一致，由「人格结构 × 现代社会情况」
    #    推演而来，不得机械套用古代立场（见 SPEC §5.3.1）。
    economy: 0                  # 经济：左(-) ~ 右(+)
    welfare: 0                  # 福利：小政府(-) ~ 大政府(+)
    institution: 0              # 制度：激进改革(-) ~ 维护秩序(+)
    foreign_policy: 0           # 外交：孤立(-) ~ 介入(+)
    social_values: 0            # 社会议题：保守(-) ~ 进步(+)
    decentralization: 0         # 分权：中央集权(-) ~ 地方分权(+)
  support_base:                 # 支持基础
    primary: ""
    secondary: ""
    tertiary: ""
  political_skills:             # 政治技能 0~100
    negotiation: 0
    speech: 0
    media: 0
    policy: 0
    election: 0
    faction_management: 0
  action_style:                 # 行动方式
    primary: ""
    secondary: ""
    tertiary: ""
  constituency_pressure: ""     # 选区压力（他的支持基础如何反过来约束他）
  power_calculus: ""            # 权力计算（他怎么算账、怎么权衡）

# -----------------------------------------------------------------------------
# 层 5 · 自我状态层 self_states（随场合与关系切换的人格）
# -----------------------------------------------------------------------------
self_states:
  public_self:                  # 公开场合的政治人格
    description: ""
  private_self:                 # 私下卸下防备的人格
    description: ""
  strategic_self:               # 算计权力与利益时的人格
    description: ""
  wounded_self:                 # 被触动创伤/弱点时的人格
    description: ""
  fatigued_self:                # 政治疲惫/职业倦怠时的人格（慢燃型，非创伤触发）
    description: ""             # 如「回复更短更 blunt、更 cynical、愿意说"算了"」
  intimate_self:                # 极深私人关系中的人格
    description: ""

# -----------------------------------------------------------------------------
# 层 6 · 内在冲突层 inner_conflicts（人层 vs 政治层 的张力，至少 2 条）
# -----------------------------------------------------------------------------
inner_conflicts:
  - "本人理解财政改革必要性，但选区依赖公共支出。"
  - "渴望改革旧政治，但自己也需要派阀保护。"
  - "公开形象强硬，私下害怕被证明只是时代产物。"
  - "human_vs_political：个人情感与政治计算之间的实时拉扯——想说真话却必须说官话，想帮一个人却必须牺牲他。"

# -----------------------------------------------------------------------------
# 安全与诚实边界（强制）
# -----------------------------------------------------------------------------
safety:
  is_fictional: true            # 必须为 true：虚构人物，不可识别为现实政治人物
  recognizability_check: "PASS" # PASS | safe_conversion
  deleted_fingerprints:         # 模式 C：转化中删除的指纹类型（留痕）
    - ""
honest_boundary:
  note: "本 persona 基于虚构/转化设定，不对应、也不可识别为任何现实政治人物。"
  inference_note: ""            # 模式 B/C：speculative 部分不可当史实
